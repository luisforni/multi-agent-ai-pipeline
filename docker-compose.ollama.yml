# Extend base compose to add Ollama local model service
# Usage: docker compose -f docker-compose.yml -f docker-compose.ollama.yml up
version: "3.9"

services:
  ollama:
    image: ollama/ollama:latest
    restart: unless-stopped
    ports:
      - "11434:11434"
    volumes:
      - ollama_data:/root/.ollama
    networks:
      - pipeline
    # Pull default model on startup
    entrypoint: ["/bin/sh", "-c", "ollama serve & sleep 5 && ollama pull ${OLLAMA_MODEL:-llama3} && wait"]

  orchestrator:
    environment:
      OLLAMA_BASE_URL: http://ollama:11434
    depends_on:
      - ollama

  researcher:
    environment:
      OLLAMA_BASE_URL: http://ollama:11434
    depends_on:
      - ollama

  summarizer:
    environment:
      OLLAMA_BASE_URL: http://ollama:11434
    depends_on:
      - ollama

  content-generator:
    environment:
      OLLAMA_BASE_URL: http://ollama:11434
    depends_on:
      - ollama

volumes:
  ollama_data:
